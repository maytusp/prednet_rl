hydra:
  run:
    dir: ./exp_local/${now:%Y.%m.%d}/${now:%H%M%S}_${agent.name}
  sweep:
    dir: ./exp_sweep/${now:%Y.%m.%d}/${now:%H%M}_${agent.name}_${experiment}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - agent=ddpg
    - domain=humanoid
    - task_sequence=[humanoid_run]
    - num_exposures=1
    - num_train_frames=2000000
    - seed=1
    - device=cuda
    - obs_type=states
    - frame_stack=3
    - action_repeat=1
    - use_wandb=true
    - wandb_mode=online
    - wandb_project=prednet_rl
    - wandb_entity=maytusp
    - wandb_group=
    - save_eval_video=false
    - experiment=nonstationary_hard3_humanoid_run_ddpg
  job:
    name: full_train
    chdir: null
    override_dirname: action_repeat=1,agent=ddpg,device=cuda,domain=humanoid,experiment=nonstationary_hard3_humanoid_run_ddpg,frame_stack=3,num_exposures=1,num_train_frames=2000000,obs_type=states,save_eval_video=false,seed=1,task_sequence=[humanoid_run],use_wandb=true,wandb_entity=maytusp,wandb_group=,wandb_mode=online,wandb_project=prednet_rl
    id: ???
    num: ???
    config_name: full_train
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: /net/scratch/n70579mp/prednet_rl
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: /net/scratch/n70579mp/prednet_rl
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: /net/scratch/n70579mp/prednet_rl/exp_local/2026.05.23/083119_ddpg
    choices:
      resources: null
      agent: ddpg
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
